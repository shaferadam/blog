<!-- templates/base.html -->
{% load static %}
<html>

<head>
    <title>Personalized Math Support Blog</title>
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>

<body>
 <div>
    <header>
            <div class="nav-left">
            <h1><a href ="{% url 'home' %}">Personalized Math Support Blog</a></h1>
            </div>
            <div class = "nav-right">
                <a href="{% url 'post_new' %}">Add New Blog Post</a>
            </div>
    </header>
    {% if user.is_authenticated %}    <!-- templates/base.html -->
    <p>Hi {{ user.username}} !</p>
     <form action = "{% url 'logout' %}" method = "post">
         {% csrf_token %}
         <button type="submit">Log Out</button>
     </form>
    {% else %}
    <p>You are not logged in.</p>
     <a href="{% url 'login' %}">Log In</a>
    <a href="{% url 'signup' %}">Sign Up</a>
    {% endif %}
    {% block content %}
    {% endblock content %}
 </div>
</body>

</html>
